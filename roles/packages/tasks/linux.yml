---
# =============================================================================
# Packages — Linux tasks
# =============================================================================

# -----------------------------------------------------------------------------
# Repo-based packages (yum/apt)
# -----------------------------------------------------------------------------
- name: Set skip_if_unavailable for third-party repos (RedHat)
  ansible.builtin.shell:
    cmd: |
      # Only set skip_if_unavailable on non-CentOS/RHEL repos (third-party)
      for repo in /etc/yum.repos.d/*.repo; do
        basename=$(basename "$repo")
        case "$basename" in
          CentOS-*|redhat-*|Rocky-*|Alma-*) continue ;;
          *) grep -q 'skip_if_unavailable' "$repo" || sed -i '/^\[/a skip_if_unavailable=1' "$repo" ;;
        esac
      done
  when: ansible_os_family == 'RedHat'
  changed_when: false

- name: Fix CentOS 7 and 8 EOL repositories (switch to vault)
  ansible.builtin.shell:
    cmd: |
      # Fix CentOS 7 and 8 base repos to use vault
      for file in /etc/yum.repos.d/CentOS-*.repo /etc/yum.repos.d/CentOS-Linux-*.repo /etc/yum.repos.d/CentOS-Stream-*.repo; do
        if [ -f "$file" ]; then
          sed -i 's/^mirrorlist=/#mirrorlist=/g' "$file"
          sed -i 's/^#mirrorlist=/#mirrorlist=/g' "$file" 2>/dev/null
          sed -i 's/^#baseurl=/baseurl=/g' "$file"
          sed -i 's/^# baseurl=/baseurl=/g' "$file"
          sed -i 's|http://mirror.centos.org|http://vault.centos.org|g' "$file"
          sed -i 's|$contentdir|centos|g' "$file"
        fi
      done
  when:
    - ansible_distribution == 'CentOS'
    - ansible_distribution_major_version in ['7', '8']
  changed_when: false


- name: Update apt cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

# -----------------------------------------------------------------------------
# Fail2ban offline package installation
# -----------------------------------------------------------------------------
- name: Create fail2ban install directory
  ansible.builtin.file:
    path: /tmp/fail2ban_install
    state: directory
    mode: "0755"
  when: "'fail2ban' in packages | default([])"

- name: Copy fail2ban offline packages to remote host
  ansible.builtin.copy:
    src: "files/fail2ban/"
    dest: /tmp/fail2ban_install/
    mode: "0644"
  when: "'fail2ban' in packages | default([])"

- name: Install epel-release offline (RedHat)
  ansible.builtin.shell:
    cmd: "yum localinstall -y /tmp/fail2ban_install/epel-release-*.rpm --disablerepo=*"
  when:
    - ansible_os_family == 'RedHat'
    - "'fail2ban' in packages | default([])"
  failed_when: false
  changed_when: false

- name: Install fail2ban from local packages (RedHat/CentOS 7)
  ansible.builtin.shell:
    cmd: "yum localinstall -y /tmp/fail2ban_install/*el7*.rpm --disablerepo=*"
  when:
    - ansible_os_family == 'RedHat'
    - ansible_distribution_major_version == '7'
    - "'fail2ban' in packages | default([])"
  changed_when: false

- name: Install fail2ban from local packages (RedHat/CentOS 8)
  ansible.builtin.shell:
    cmd: "yum localinstall -y /tmp/fail2ban_install/*el8*.rpm --disablerepo=*"
  when:
    - ansible_os_family == 'RedHat'
    - ansible_distribution_major_version == '8'
    - "'fail2ban' in packages | default([])"
  changed_when: false

- name: Install fail2ban from local packages (Debian)
  ansible.builtin.shell:
    cmd: "apt-get install -y /tmp/fail2ban_install/*.deb"
  when:
    - ansible_os_family == 'Debian'
    - "'fail2ban' in packages | default([])"
  changed_when: false

- name: Clean up fail2ban install directory
  ansible.builtin.file:
    path: /tmp/fail2ban_install
    state: absent
  when: "'fail2ban' in packages | default([])"

- name: Enable and start fail2ban service
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  when: "'fail2ban' in packages | default([])"

- name: Clean yum metadata to force refresh (RedHat)
  ansible.builtin.command: yum clean all
  when:
    - ansible_os_family == 'RedHat'
    - ansible_distribution_major_version in ['7', '8']
  changed_when: false


- name: Install Linux packages from repos
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ packages | default([]) | reject('equalto', 'fireeye-agent') | reject('equalto', 'fail2ban') | list }}"
  register: linux_package_result

- name: Display Linux package installation results
  ansible.builtin.debug:
    msg: "Installed {{ linux_package_result.results | selectattr('changed', 'equalto', true) | list | length }} repo package(s)"
  when: linux_package_result.results | default([]) | length > 0

# -----------------------------------------------------------------------------
# FireEye agent from local .tgz
# -----------------------------------------------------------------------------
- name: Check if FireEye agent is already running (Linux)
  ansible.builtin.command:
    cmd: systemctl is-active xagt
  register: linux_xagt_status
  changed_when: false
  failed_when: false
  check_mode: false
  when: packages | default([]) | intersect(['fireeye-agent']) | length > 0

- name: Install FireEye agent on Linux
  when:
    - packages | default([]) | intersect(['fireeye-agent']) | length > 0
    - fireeye_package is defined
    - linux_xagt_status.rc | default(1) != 0
  block:
    - name: Create FireEye install directory
      ansible.builtin.file:
        path: /tmp/fireeye_install
        state: directory
        mode: "0755"

    - name: Copy FireEye .tgz to remote host
      ansible.builtin.copy:
        src: "{{ fireeye_package }}"
        dest: /tmp/fireeye_install/fireeye-agent.tgz
        mode: "0644"

    - name: Extract FireEye .tgz
      ansible.builtin.shell:
        cmd: tar xzf /tmp/fireeye_install/fireeye-agent.tgz -C /tmp/fireeye_install

    - name: Find installer script or RPM in extracted files
      ansible.builtin.find:
        paths: /tmp/fireeye_install
        patterns: ["*.rpm", "*.deb", "install.sh", "agent_install.sh"]
        recurse: true
      register: fireeye_installer_files

    - name: Install FireEye RPM package (RedHat)
      ansible.builtin.yum:
        name: "{{ item.path }}"
        state: present
      loop: "{{ fireeye_installer_files.files | selectattr('path', 'match', '.*\\.rpm$') | list }}"
      when: ansible_os_family == 'RedHat'

    - name: Install FireEye DEB package (Debian)
      ansible.builtin.apt:
        deb: "{{ item.path }}"
        state: present
      loop: "{{ fireeye_installer_files.files | selectattr('path', 'match', '.*\\.deb$') | list }}"
      when: ansible_os_family == 'Debian'

    - name: Run FireEye install script (if present, no RPM/DEB found)
      ansible.builtin.shell:
        cmd: "bash {{ item.path }}"
        chdir: /tmp/fireeye_install
      loop: "{{ fireeye_installer_files.files | selectattr('path', 'match', '.*install.*\\.sh$') | list }}"
      when: fireeye_installer_files.files | selectattr('path', 'match', '.*\\.(rpm|deb)$') | list | length == 0

    - name: Find agent_config.json in extracted files
      ansible.builtin.find:
        paths: /tmp/fireeye_install
        patterns: ["agent_config.json"]
        recurse: true
      register: fireeye_config_files

    - name: Start and enable FireEye agent service
      ansible.builtin.service:
        name: xagt
        state: started
        enabled: true

    - name: Clean up FireEye install directory
      ansible.builtin.file:
        path: /tmp/fireeye_install
        state: absent
