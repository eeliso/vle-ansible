---
- name: Ensure C:\Temp\scc directory exists
  ansible.windows.win_file:
    path: C:\Temp\scc
    state: directory

- name: Copy SCC installer to Windows target
  ansible.windows.win_copy:
    src: "scc-5.14_Windows/SCC_5.14_Windows_Setup.exe"
    dest: C:\Temp\scc\SCC_5.14_Windows_Setup.exe

- name: Check if SCC is already installed
  ansible.windows.win_stat:
    path: 'C:\Program Files\SCAP Compliance Checker\cscc.exe'
  register: scc_installed

- name: Install SCC on Windows (InstallShield silent mode)
  ansible.windows.win_package:
    path: C:\Temp\scc\SCC_5.14_Windows_Setup.exe
    arguments:
      - /S
      - /v"/qn /l*v C:\Temp\scc_install.log REBOOT=ReallySuppress"
    expected_return_code: [0, 3010]
  register: scc_install_result
  timeout: 300
  when: not scc_installed.stat.exists

- name: Fallback - Install SCC on Windows (Inno Setup silent mode)
  ansible.windows.win_command:
    cmd: >-
      C:\Temp\scc\SCC_5.14_Windows_Setup.exe
      /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
      /LOG="C:\Temp\scc_install.log"
  register: scc_install_fallback
  timeout: 300
  when:
    - not scc_installed.stat.exists
    - scc_install_result is defined
    - scc_install_result is failed
  ignore_errors: true

- name: Check SCC installed successfully
  ansible.windows.win_stat:
    path: 'C:\Program Files\SCAP Compliance Checker\cscc.exe'
  register: scc_post_install
  failed_when: not scc_post_install.stat.exists

- name: Run SCC local scan on Windows
  ansible.windows.win_command:
    cmd: '"C:\Program Files\SCAP Compliance Checker\cscc.exe"'
  register: scc_windows_scan
  changed_when: "scc_windows_scan.rc == 0"
  ignore_errors: true

- name: Archive SCC sessions directory for fetching on Windows
  ansible.windows.win_shell:
    cmd: "Compress-Archive -Path $env:USERPROFILE\\SCC\\Sessions -DestinationPath C:\\Temp\\scc_sessions.zip -Force"
  register: scc_windows_archive
  changed_when: false
  ignore_errors: true

- name: Fetch Windows scan results archive to controller
  ansible.builtin.fetch:
    src: "C:\\Temp\\scc_sessions.zip"
    dest: "scc_results/{{ inventory_hostname }}/scc_sessions.zip"
    flat: true
  when: scc_windows_archive.rc == 0
